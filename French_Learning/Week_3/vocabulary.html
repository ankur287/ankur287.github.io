// ── Render Cards ─────────────────────────────────────────────
function renderVocab() {
  const container = document.getElementById('vocab-container');
  const masc = vocab.filter(w => w.gender === 'masc');
  const fem  = vocab.filter(w => w.gender === 'fem');

  let html = '';

  // Masculine section
  html += `<div class="section-divider" style="color:var(--masc)">
    <span style="background:var(--masc-bg);color:var(--masc);padding:3px 14px;border-radius:20px;font-size:11px;">
      ♂ Masculin — 25 noms
    </span>
  </div>`;
  masc.forEach(w => { html += buildCard(w); });

  // Feminine section
  html += `<div class="section-divider" style="color:var(--fem)">
    <span style="background:var(--fem-bg);color:var(--fem);padding:3px 14px;border-radius:20px;font-size:11px;">
      ♀ Féminin — 25 noms
    </span>
  </div>`;
  fem.forEach(w => { html += buildCard(w); });

  container.innerHTML = html;

  // Attach show/hide toggle handlers
  container.querySelectorAll('.show-english-btn').forEach(btn => {
    btn.addEventListener('click', function() { toggleTranslation(this); });
  });
}

function buildCard(w) {
  const isMasc = w.gender === 'masc';
  const gClass = isMasc ? 'masc' : 'fem';
  const gLabel = isMasc ? 'Masculin' : 'Féminin';
  const wid    = 'wp-' + w.id;
  const sid    = 'sp-' + w.id;

  const elisionNote = w.elision
    ? `<div style="font-size:11px;color:var(--phonetic);margin-top:3px;">💡 Élision: <strong>le/la</strong> → <strong>l'</strong> before a vowel</div>`
    : '';

  const liaisonNote = w.liaison
    ? `<div class="liaison-note">🔗 Liaison: ${w.liaison}</div>`
    : '';

  return `
  <div class="vocab-card">
    <div class="vocab-card-header">
      <span class="gender-badge ${gClass}">${gLabel}</span>
      <div class="french-word">${w.french}</div>
      <div class="phonetic-guide">${w.phonetic}</div>
      ${elisionNote}
      <div class="player-wrap">
        <div class="short-player" id="${wid}" data-audio="${w.french}">
          <button class="play-btn">▶ Play</button>
          <button class="restart-btn">↺</button>
        </div>
      </div>
    </div>
    <div class="vocab-card-body">
      <button class="show-english-btn">Show English</button>
      <div class="vocab-translation">${w.english}</div>

      <div class="example-section">
        <div class="example-label">Exemple</div>
        <div class="example-french">${w.exFr}</div>
        <div class="example-phonetics">
          ${w.exPhonetic}
          ${liaisonNote}
        </div>
        <div class="player-wrap">
          <div class="short-player" id="${sid}" data-audio="${escAttr(w.exFrAudio)}">
            <button class="play-btn">▶ Play</button>
            <button class="restart-btn">↺</button>
          </div>
        </div>
        <button class="show-english-btn">Show English</button>
        <div class="example-translation">${w.exEn}</div>
      </div>
    </div>
  </div>`;
}

function escAttr(s) { return s.replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }

function toggleTranslation(btn) {
  const target = btn.nextElementSibling;
  if (!target) return;
  const showing = target.classList.contains('visible');
  target.classList.toggle('visible', !showing);
  btn.textContent = showing ? 'Show English' : 'Hide English';
}

function showAll() {
  document.querySelectorAll('.vocab-translation, .example-translation').forEach(el => el.classList.add('visible'));
  document.querySelectorAll('.show-english-btn').forEach(btn => btn.textContent = 'Hide English');
}
function hideAll() {
  document.querySelectorAll('.vocab-translation, .example-translation').forEach(el => el.classList.remove('visible'));
  document.querySelectorAll('.show-english-btn').forEach(btn => btn.textContent = 'Show English');
}

// Render on load, then init audio players
document.addEventListener('DOMContentLoaded', () => {
  renderVocab();
  // audio.js auto-init fires after DOMContentLoaded too,
  // so re-trigger manually after render:
  document.querySelectorAll('[data-audio]').forEach(el => {
    const text = el.getAttribute('data-audio');
    if (!text || !el.id) return;
    const wc = text.trim().split(/\s+/).filter(Boolean).length;
    if (wc < 20) buildShortPlayer(text, el.id);
    else          buildLongPlayer(text, el.id);
  });
});
</script>
</body>
</html>
