<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz — Week 2</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a href="../index.html" class="header-logo">🇫🇷 CLB 7</a>
      <span class="header-title">Quiz</span>
      <span class="header-week">Week 2/30</span>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" style="width:6.67%"></div>
    </div>
  </header>

  <nav class="site-nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-link"><span class="nav-icon">🏠</span> Home</a>
      <a href="vocabulary.html" class="nav-link"><span class="nav-icon">📖</span> Vocab</a>
      <a href="grammar.html" class="nav-link"><span class="nav-icon">✏️</span> Grammar</a>
      <a href="reading.html" class="nav-link"><span class="nav-icon">📄</span> Reading</a>
      <a href="quiz.html" class="nav-link active"><span class="nav-icon">🎯</span> Quiz</a>
    </div>
  </nav>

  <main class="main">
    <div class="section-header">
      <h1 class="section-title">Quiz — Week 2</h1>
      <p class="section-subtitle">50 questions on vocabulary and grammar. 30% easy, 50% medium, 20% hard.</p>
    </div>

    <div id="quiz-area"></div>
    <div id="score-area" style="display:none;"></div>
  </main>

  <script>
    const questions = [
      // ─── EASY (1–15) ───
      {
        diff: "easy",
        q: "What does the French verb <em>être</em> mean in English?",
        opts: ["to have","to be","to go","to do"],
        correct: 1,
        exp: "<em>Être</em> means 'to be'. It's one of the most essential irregular verbs in French."
      },
      {
        diff: "easy",
        q: "How do you say 'I am' in French?",
        opts: ["j'ai","je vais","je suis","je fais"],
        correct: 2,
        exp: "'Je suis' comes from the verb <em>être</em> (to be). Je suis = I am."
      },
      {
        diff: "easy",
        q: "What does <em>j'ai</em> mean in English?",
        opts: ["I go","I am","I do","I have"],
        correct: 3,
        exp: "<em>J'ai</em> is the first-person singular form of <em>avoir</em> (to have). J'ai = I have."
      },
      {
        diff: "easy",
        q: "Which French verb means 'to go'?",
        opts: ["être","avoir","aller","faire"],
        correct: 2,
        exp: "<em>Aller</em> means 'to go'. It is highly irregular — je vais, tu vas, il va..."
      },
      {
        diff: "easy",
        q: "How do you say 'we are' in French?",
        opts: ["nous avons","nous sommes","nous allons","nous faisons"],
        correct: 1,
        exp: "'Nous sommes' is the first-person plural of <em>être</em> (to be)."
      },
      {
        diff: "easy",
        q: "What is the English translation of <em>il a</em>?",
        opts: ["he goes","he is","he has","he does"],
        correct: 2,
        exp: "<em>Il a</em> = he has. This is the third-person singular of <em>avoir</em> (to have)."
      },
      {
        diff: "easy",
        q: "Which French word means 'always'?",
        opts: ["jamais","parfois","souvent","toujours"],
        correct: 3,
        exp: "<em>Toujours</em> = always. Remember: jamais = never, souvent = often, parfois = sometimes."
      },
      {
        diff: "easy",
        q: "What does <em>maintenant</em> mean?",
        opts: ["tomorrow","yesterday","now","later"],
        correct: 2,
        exp: "<em>Maintenant</em> = now. It is a common time adverb used in present-tense sentences."
      },
      {
        diff: "easy",
        q: "How do you say 'they go' (masculine) in French?",
        opts: ["ils sont","ils ont","ils vont","ils font"],
        correct: 2,
        exp: "'Ils vont' is the third-person plural of <em>aller</em> (to go)."
      },
      {
        diff: "easy",
        q: "What does <em>faire les courses</em> mean?",
        opts: ["to cook","to do homework","to go grocery shopping","to exercise"],
        correct: 2,
        exp: "<em>Faire les courses</em> = to go grocery shopping. It's a very common French expression."
      },
      {
        diff: "easy",
        q: "What is <em>vous êtes</em>?",
        opts: ["you have","you are","you go","you do"],
        correct: 1,
        exp: "<em>Vous êtes</em> = you are (formal or plural). From the verb <em>être</em> (to be)."
      },
      {
        diff: "easy",
        q: "Which French word means 'never'?",
        opts: ["toujours","souvent","parfois","jamais"],
        correct: 3,
        exp: "<em>Jamais</em> = never. In a negative sentence: 'Je ne fais jamais ça.' (I never do that.)"
      },
      {
        diff: "easy",
        q: "What does <em>avoir soif</em> mean?",
        opts: ["to be hungry","to be cold","to be thirsty","to be right"],
        correct: 2,
        exp: "<em>Avoir soif</em> = to be thirsty (literally 'to have thirst'). French uses <em>avoir</em> for these states."
      },
      {
        diff: "easy",
        q: "How do you say 'she is' in French?",
        opts: ["elle a","elle va","elle fait","elle est"],
        correct: 3,
        exp: "'Elle est' = she is. Third-person singular feminine of <em>être</em> (to be)."
      },
      {
        diff: "easy",
        q: "What does <em>le soir</em> mean?",
        opts: ["in the morning","in the evening","every day","sometimes"],
        correct: 1,
        exp: "<em>Le soir</em> = in the evening. <em>Le matin</em> = in the morning. Remember the difference!"
      },
      // ─── MEDIUM (16–40) ───
      {
        diff: "medium",
        q: "Which is the correct conjugation of <em>être</em> for <em>nous</em>?",
        opts: ["nous êtes","nous sont","nous sommes","nous avons"],
        correct: 2,
        exp: "'Nous sommes' is the only correct form. <em>Être</em> is irregular — you must memorise all forms."
      },
      {
        diff: "medium",
        q: "Fill in the blank: <em>Elle ___ au marché.</em> (to go)",
        opts: ["est","a","va","fait"],
        correct: 2,
        exp: "'Elle va' = she goes. Third-person singular of <em>aller</em> (to go)."
      },
      {
        diff: "medium",
        q: "What does <em>avoir raison</em> mean?",
        opts: ["to be wrong","to be right","to need","to be hungry"],
        correct: 1,
        exp: "<em>Avoir raison</em> = to be right. Its opposite is <em>avoir tort</em> (to be wrong)."
      },
      {
        diff: "medium",
        q: "Which sentence uses <em>aller</em> correctly?",
        opts: ["Je fais au cinéma.","Je vais au cinéma.","Je suis au cinéma.","J'ai au cinéma."],
        correct: 1,
        exp: "'Je vais au cinéma' = I am going to the cinema. <em>Aller</em> is used for movement, followed by <em>à</em>."
      },
      {
        diff: "medium",
        q: "Complete the sentence: <em>Vous ___ de bons étudiants.</em>",
        opts: ["avez","allez","faites","êtes"],
        correct: 3,
        exp: "'Vous êtes de bons étudiants' = You are good students. <em>Être</em> is used to describe identity."
      },
      {
        diff: "medium",
        q: "<em>Ils font</em> is the conjugation of which verb?",
        opts: ["aller","être","avoir","faire"],
        correct: 3,
        exp: "'Ils font' = they do/make. Third-person plural of <em>faire</em> (to do/make)."
      },
      {
        diff: "medium",
        q: "What is the correct translation of <em>Nous avons faim</em>?",
        opts: ["We are thirsty","We are hungry","We go to eat","We make food"],
        correct: 1,
        exp: "'Nous avons faim' = We are hungry. Literally 'we have hunger' — French uses <em>avoir</em>, not <em>être</em>, for hunger."
      },
      {
        diff: "medium",
        q: "Which pronoun goes with <em>sommes</em>?",
        opts: ["je","tu","nous","vous"],
        correct: 2,
        exp: "'Nous sommes' — <em>sommes</em> is exclusively the nous form of <em>être</em>."
      },
      {
        diff: "medium",
        q: "How do you say 'I need' in French?",
        opts: ["J'ai besoin","Je suis besoin","Je vais besoin","Je fais besoin"],
        correct: 0,
        exp: "'J'ai besoin' = I need. The expression is <em>avoir besoin de</em> — it uses <em>avoir</em> (to have)."
      },
      {
        diff: "medium",
        q: "<em>Tu as tort</em> means:",
        opts: ["You are right","You need","You are wrong","You go wrong"],
        correct: 2,
        exp: "<em>Avoir tort</em> = to be wrong. The opposite is <em>avoir raison</em> (to be right)."
      },
      {
        diff: "medium",
        q: "Which is NOT a correct form of <em>avoir</em>?",
        opts: ["j'ai","tu as","il est","nous avons"],
        correct: 2,
        exp: "'Il est' belongs to <em>être</em> (to be). The third-person singular of <em>avoir</em> is 'il a'."
      },
      {
        diff: "medium",
        q: "What does <em>faire du sport</em> mean?",
        opts: ["to make music","to do sports / exercise","to go to school","to cook"],
        correct: 1,
        exp: "<em>Faire du sport</em> = to exercise / to play sports. <em>Du</em> is the partitive article (de + le)."
      },
      {
        diff: "medium",
        q: "Complete: <em>Je ___ mes devoirs le soir.</em>",
        opts: ["suis","ai","vais","fais"],
        correct: 3,
        exp: "'Je fais mes devoirs' = I do my homework. <em>Faire</em> is used for activities and tasks."
      },
      {
        diff: "medium",
        q: "<em>Vous allez</em> is used when speaking to:",
        opts: ["a close friend only","one person formally or multiple people","oneself","animals"],
        correct: 1,
        exp: "<em>Vous</em> can be singular formal (polite) or plural (multiple people). Both use 'vous allez'."
      },
      {
        diff: "medium",
        q: "Which sentence means 'She always goes to work'?",
        opts: ["Elle est toujours au travail","Elle va toujours au travail","Elle fait toujours le travail","Elle a toujours le travail"],
        correct: 1,
        exp: "'Elle va toujours au travail' = She always goes to work. <em>Aller</em> expresses movement, <em>toujours</em> = always."
      },
      {
        diff: "medium",
        q: "What does <em>parfois</em> mean?",
        opts: ["always","never","often","sometimes"],
        correct: 3,
        exp: "<em>Parfois</em> = sometimes. It can also be said as <em>quelquefois</em>."
      },
      {
        diff: "medium",
        q: "<em>Nous faisons une promenade</em> means:",
        opts: ["We are taking a walk","We are making friends","We go to the park","We are doing homework"],
        correct: 0,
        exp: "<em>Faire une promenade</em> = to go for / take a walk. A very common French expression."
      },
      {
        diff: "medium",
        q: "Which is the correct form? 'They have' (masculine plural)",
        opts: ["ils sont","ils font","ils ont","ils vont"],
        correct: 2,
        exp: "'Ils ont' = they have. Note the liaison: pronounced 'eel-ZON'. Third-person plural of <em>avoir</em>."
      },
      {
        diff: "medium",
        q: "Complete: <em>J'ai ___ d'aide.</em> (I need help)",
        opts: ["soif","faim","besoin","raison"],
        correct: 2,
        exp: "'J'ai besoin d'aide' = I need help. <em>Avoir besoin de</em> = to need (something)."
      },
      {
        diff: "medium",
        q: "<em>Elle fait la cuisine</em> means:",
        opts: ["She goes to the kitchen","She is in the kitchen","She cooks","She has a kitchen"],
        correct: 2,
        exp: "<em>Faire la cuisine</em> = to cook. <em>Faire</em> is used for many household and daily activities."
      },
      {
        diff: "medium",
        q: "Which sentence is in the present tense?",
        opts: ["Nous irons au cinéma","Nous allons au cinéma","Nous sommes allés au cinéma","Nous allions au cinéma"],
        correct: 1,
        exp: "'Nous allons' is present tense. <em>Irons</em> is future, <em>sommes allés</em> is passé composé, <em>allions</em> is imperfect."
      },
      {
        diff: "medium",
        q: "<em>Toujours</em> and <em>jamais</em> are examples of:",
        opts: ["verbs","nouns","frequency adverbs","adjectives"],
        correct: 2,
        exp: "Both are frequency adverbs. They tell you <em>how often</em> something happens."
      },
      {
        diff: "medium",
        q: "Complete: <em>Tu ___ à la maison maintenant ?</em>",
        opts: ["fais","es","as","vas"],
        correct: 1,
        exp: "'Tu es à la maison ?' = Are you at home? <em>Être</em> is used for location."
      },
      {
        diff: "medium",
        q: "The expression <em>avoir tort</em> is the opposite of:",
        opts: ["avoir faim","avoir soif","avoir raison","avoir besoin"],
        correct: 2,
        exp: "<em>Avoir raison</em> (to be right) is the opposite of <em>avoir tort</em> (to be wrong)."
      },
      {
        diff: "medium",
        q: "What does <em>souvent</em> mean?",
        opts: ["always","never","often","sometimes"],
        correct: 2,
        exp: "<em>Souvent</em> = often. Remember the frequency scale: toujours → souvent → parfois → jamais."
      },
      // ─── HARD (41–50) ───
      {
        diff: "hard",
        q: "Which sentence correctly demonstrates liaison in spoken French?",
        opts: [
          "Ils ont une maison (pronounced eel-ZON)",
          "Vous êtes gentil (pronounced voo-ZET)",
          "Both A and B use liaison correctly",
          "Neither uses liaison"
        ],
        correct: 2,
        exp: "Both are correct. Liaison: 'ils ont' → 'eel-ZON' (s of ils links to ont). 'Vous êtes' → 'voo-ZET' (s of vous links to êtes)."
      },
      {
        diff: "hard",
        q: "<em>Nous faisons</em> has an irregular pronunciation. How is the vowel in <em>fai-</em> pronounced here?",
        opts: [
          "'FAY' (like je fais)",
          "'fuh' (like the e in 'le')",
          "'FAZ'",
          "'fah'"
        ],
        correct: 1,
        exp: "Despite the spelling <em>fai-</em>, 'nous faisons' is pronounced 'noo-fuh-ZON'. This is one of the rare vowel sound shifts in French conjugation."
      },
      {
        diff: "hard",
        q: "In which sentence is <em>être</em> used as an auxiliary (helper) verb, not as a main verb?",
        opts: [
          "Je suis fatigué.",
          "Je suis allé au marché.",
          "Je suis étudiant.",
          "Je suis toujours ici."
        ],
        correct: 1,
        exp: "'Je suis allé' uses <em>être</em> as an auxiliary to form the passé composé. The others use <em>être</em> as a main verb (to be)."
      },
      {
        diff: "hard",
        q: "In the sentence <em>Ils vont faire les courses</em>, what does <em>vont faire</em> express?",
        opts: [
          "They are doing grocery shopping right now",
          "They used to go grocery shopping",
          "They are going to go grocery shopping (near future)",
          "They should go grocery shopping"
        ],
        correct: 2,
        exp: "<em>Aller + infinitive</em> forms the near future (futur proche). 'Ils vont faire' = They are going to do (something)."
      },
      {
        diff: "hard",
        q: "Which statement about the pronoun <em>vous</em> is correct?",
        opts: [
          "It only refers to multiple people",
          "It is always formal",
          "It can be singular formal or plural",
          "It is only used in written French"
        ],
        correct: 2,
        exp: "<em>Vous</em> is both the polite singular form (tutoiement vs. vouvoiement) and the general plural. Context tells you which is intended."
      },
      {
        diff: "hard",
        q: "What makes <em>vous faites</em> grammatically unique compared to other verbs?",
        opts: [
          "It uses a different stem",
          "The -tes ending is unique; most verbs use -ez for vous",
          "It requires a reflexive pronoun",
          "The accent changes the meaning"
        ],
        correct: 1,
        exp: "Almost all French verbs use -ez for the <em>vous</em> form (vous parlez, vous mangez). <em>Vous faites</em> is one of the very rare exceptions with -tes."
      },
      {
        diff: "hard",
        q: "Which of these is NOT an idiomatic expression with <em>avoir</em>?",
        opts: ["avoir faim","avoir chaud","avoir aller","avoir raison"],
        correct: 2,
        exp: "'Avoir aller' is not a real expression. The others are all genuine <em>avoir</em> idioms for states (hungry, hot, right)."
      },
      {
        diff: "hard",
        q: "In Quebec French, <em>être</em> is sometimes used as an auxiliary. Which verb would typically use <em>être</em> as its auxiliary in standard French?",
        opts: ["manger","parler","aller","travailler"],
        correct: 2,
        exp: "<em>Aller</em> uses <em>être</em> as its auxiliary in compound tenses: 'Je suis allé(e).' Most other verbs use <em>avoir</em>."
      },
      {
        diff: "hard",
        q: "Which sentence demonstrates incorrect subject-verb agreement?",
        opts: [
          "Nous sommes contents.",
          "Elles sont parties.",
          "Vous êtes grands.",
          "Ils est fatigués."
        ],
        correct: 3,
        exp: "'Ils est fatigués' is wrong. Third-person plural of <em>être</em> is <em>sont</em>, not <em>est</em>. Correct: 'Ils sont fatigués.'"
      },
      {
        diff: "hard",
        q: "The near future structure using <em>aller + infinitive</em> — which shows the correct form?",
        opts: [
          "Je vais que manger.",
          "Je vais manger.",
          "Je suis allé manger.",
          "J'ai aller manger."
        ],
        correct: 1,
        exp: "The near future is: [conjugated <em>aller</em>] + [infinitive]. 'Je vais manger' = I am going to eat. No connecting word needed."
      }
    ];

    let currentQ = 0;
    let score = 0;
    let answered = new Array(questions.length).fill(false);
    let selectedCorrect = new Array(questions.length).fill(false);

    const quizArea = document.getElementById('quiz-area');
    const scoreArea = document.getElementById('score-area');

    function renderQuestion(index) {
      const q = questions[index];
      const diffClass = { easy: 'diff-easy', medium: 'diff-medium', hard: 'diff-hard' }[q.diff];
      const diffLabel = { easy: '⭐ Easy', medium: '⭐⭐ Medium', hard: '⭐⭐⭐ Hard' }[q.diff];
      const letters = ['A','B','C','D'];

      quizArea.innerHTML = `
        <div class="quiz-progress-info">
          <span>Question ${index + 1} of ${questions.length}</span>
          <span>Score: ${score} / ${index}</span>
        </div>
        <div class="quiz-progress-bar">
          <div class="quiz-progress-fill" style="width:${(index / questions.length) * 100}%"></div>
        </div>

        <div class="quiz-q-card">
          <span class="quiz-difficulty ${diffClass}">${diffLabel}</span>
          <div class="quiz-q-text">${q.q}</div>
          <div class="quiz-options" id="quiz-opts">
            ${q.opts.map((opt, i) => `
              <button class="quiz-option" onclick="selectOption(this, ${i}, ${q.correct}, ${index})" id="opt-${i}">
                <span class="option-letter">${letters[i]}</span>
                <span>${opt}</span>
              </button>
            `).join('')}
          </div>
          <div class="quiz-explanation" id="quiz-exp"></div>
        </div>

        <div class="quiz-nav">
          <button class="quiz-prev-btn" onclick="goTo(${index - 1})" ${index === 0 ? 'disabled style="opacity:.4"' : ''}>← Previous</button>
          <button class="quiz-next-btn" id="next-btn" onclick="goTo(${index + 1})" ${!answered[index] ? 'disabled style="opacity:.4"' : ''}>
            ${index === questions.length - 1 ? 'Finish Quiz 🎉' : 'Next Question →'}
          </button>
        </div>
      `;

      // Restore state if already answered
      if (answered[index]) {
        const opts = quizArea.querySelectorAll('.quiz-option');
        opts.forEach((btn, i) => {
          btn.disabled = true;
          if (i === q.correct) btn.classList.add('correct');
        });
        const exp = document.getElementById('quiz-exp');
        exp.innerHTML = q.exp;
        exp.className = 'quiz-explanation show ' + (selectedCorrect[index] ? 'correct' : 'wrong');
      }
    }

    function selectOption(btn, selectedIdx, correctIdx, qIndex) {
      if (answered[qIndex]) return;
      answered[qIndex] = true;

      const isCorrect = selectedIdx === correctIdx;
      selectedCorrect[qIndex] = isCorrect;
      if (isCorrect) score++;

      // Disable all options and highlight
      const opts = quizArea.querySelectorAll('.quiz-option');
      opts.forEach((b, i) => {
        b.disabled = true;
        if (i === correctIdx) b.classList.add('correct');
      });
      if (!isCorrect) btn.classList.add('wrong');

      // Show explanation
      const exp = document.getElementById('quiz-exp');
      exp.innerHTML = (isCorrect ? '✅ Correct! ' : '❌ Incorrect. ') + questions[qIndex].exp;
      exp.className = 'quiz-explanation show ' + (isCorrect ? 'correct' : 'wrong');

      // Unlock Next button
      const nextBtn = document.getElementById('next-btn');
      if (nextBtn) { nextBtn.disabled = false; nextBtn.style.opacity = '1'; }
    }

    function goTo(index) {
      if (index < 0) return;
      if (index >= questions.length) { showScore(); return; }
      currentQ = index;
      renderQuestion(index);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function showScore() {
      quizArea.style.display = 'none';
      scoreArea.style.display = 'block';

      const pct = Math.round((score / questions.length) * 100);
      let emoji, msg;
      if (pct >= 90) { emoji = '🏆'; msg = 'Excellent! You have mastered Week 2!'; }
      else if (pct >= 75) { emoji = '🎉'; msg = 'Great work! Review the questions you missed and try again.'; }
      else if (pct >= 60) { emoji = '💪'; msg = 'Good effort! Re-read the grammar section and retry.'; }
      else if (pct >= 40) { emoji = '📚'; msg = 'Keep studying — revisit vocabulary and grammar before retrying.'; }
      else { emoji = '🌱'; msg = 'Keep going! Start with the vocabulary section and work through the grammar.'; }

      scoreArea.innerHTML = `
        <div class="score-card">
          <div class="score-emoji">${emoji}</div>
          <div class="score-number">${score}<span style="font-size:32px;color:var(--gray-400);">/${questions.length}</span></div>
          <div class="score-label">${pct}% correct</div>
          <div class="score-message">${msg}</div>
          <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
            <button class="retry-btn" onclick="resetQuiz()">🔄 Retry Quiz</button>
            <a href="vocabulary.html" style="text-decoration:none;">
              <button class="retry-btn" style="background:var(--navy);">📖 Review Vocab</button>
            </a>
          </div>
        </div>
      `;
    }

    function resetQuiz() {
      currentQ = 0;
      score = 0;
      answered.fill(false);
      selectedCorrect.fill(false);
      quizArea.style.display = '';
      scoreArea.style.display = 'none';
      renderQuestion(0);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Init
    renderQuestion(0);
  </script>
</body>
</html>
