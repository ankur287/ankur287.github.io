<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vocabulary — Week 2</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* ── Section dividers ── */
    .vocab-section-title {
      font-family: 'Lora', serif;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--gray-400);
      padding: 20px 0 8px;
      border-bottom: 2px solid var(--gray-100);
      margin-bottom: 14px;
    }

    /* ── Card ── */
    .vocab-card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--gray-200);
      padding: 18px;
      margin-bottom: 12px;
      transition: box-shadow .2s;
    }
    .vocab-card:hover { box-shadow: var(--shadow-md); }

    .vocab-french {
      font-family: 'Lora', serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 2px;
    }
    .vocab-phonetic {
      font-size: 13px;
      color: #7c3aed;
      font-style: italic;
      margin-bottom: 10px;
    }

    /* Player sits right after phonetic */
    .word-player-wrap { margin-bottom: 12px; }

    /* Show English button */
    .reveal-wrap { margin-bottom: 14px; }
    .reveal-btn {
      background: var(--blue-pale);
      color: var(--blue);
      border: 1.5px solid var(--blue);
      border-radius: var(--radius-sm);
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      min-height: 48px;
      width: 100%;
      transition: background .2s, color .2s;
      font-family: 'Inter', sans-serif;
    }
    .reveal-btn:hover { background: var(--blue); color: white; }
    .vocab-english {
      display: none;
      font-size: 18px;
      font-weight: 700;
      color: var(--navy);
      padding: 10px 0 4px;
    }
    .vocab-english.shown { display: block; }

    /* Divider */
    .vocab-divider {
      border: none;
      border-top: 1px solid var(--gray-100);
      margin: 12px 0;
    }

    /* Example */
    .example-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--gray-400);
      margin-bottom: 5px;
    }
    .example-fr {
      font-family: 'Lora', serif;
      font-size: 16px;
      color: var(--navy);
      font-style: italic;
      margin-bottom: 8px;
    }
    .example-player-wrap { margin-bottom: 8px; }
    .reveal-translation-btn {
      background: none;
      border: none;
      font-size: 12px;
      color: var(--blue);
      cursor: pointer;
      padding: 0;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      text-decoration: underline;
      min-height: 24px;
    }
    .example-en {
      display: none;
      font-size: 14px;
      color: var(--gray-600);
      font-weight: 400;
      padding-top: 4px;
      line-height: 1.5;
    }
    .example-en.shown { display: block; }

    /* Show all / hide all bar */
    .showallbar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .showallbar button {
      flex: 1;
      background: var(--navy);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      padding: 13px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      min-height: 48px;
      font-family: 'Inter', sans-serif;
      transition: background .2s;
    }
    .showallbar button:hover { background: var(--navy-light); }
    .showallbar button.hide-btn { background: var(--gray-200); color: var(--gray-600); }
    .showallbar button.hide-btn:hover { background: var(--gray-300, #d1d5db); }

    .count-badge {
      display: inline-block;
      background: var(--blue-pale);
      color: var(--blue);
      border-radius: 20px;
      padding: 3px 12px;
      font-size: 12px;
      font-weight: 700;
      margin-left: 8px;
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a href="../index.html" class="header-logo">🇫🇷 CLB 7</a>
      <span class="header-title">Vocabulary</span>
      <span class="header-week">Week 2/30</span>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" style="width:6.67%"></div>
    </div>
  </header>

  <nav class="site-nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-link"><span class="nav-icon">🏠</span> Home</a>
      <a href="vocabulary.html" class="nav-link active"><span class="nav-icon">📖</span> Vocab</a>
      <a href="grammar.html" class="nav-link"><span class="nav-icon">✏️</span> Grammar</a>
      <a href="reading.html" class="nav-link"><span class="nav-icon">📄</span> Reading</a>
      <a href="quiz.html" class="nav-link"><span class="nav-icon">🎯</span> Quiz</a>
    </div>
  </nav>

  <main class="main">
    <div class="section-header">
      <h1 class="section-title">Vocabulary <span class="count-badge">55 words</span></h1>
      <p class="section-subtitle">Tap <strong>Show English</strong> to test yourself. Press ▶ to hear the word or sentence spoken.</p>
    </div>

    <div class="showallbar">
      <button onclick="showAllEnglish()">👁 Show All English</button>
      <button class="hide-btn" onclick="hideAllEnglish()">🙈 Hide All</button>
    </div>

    <div id="vocab-container"></div>
  </main>

  <script src="audio.js"></script>
  <script>
  /*
    Sections and words.
    Each word: { fr, ph, en, ex, exEn }
    No grammar explanations — those live in grammar.html
  */
  const sections = [
    {
      title: "The 4 core verbs — infinitive (dictionary) form",
      words: [
        { fr:"être",  ph:"EH-tr",       en:"to be",           ex:"Je suis étudiant.",    exEn:"I am a student." },
        { fr:"avoir", ph:"ah-VWAHR",    en:"to have",         ex:"J'ai un livre.",       exEn:"I have a book." },
        { fr:"aller", ph:"ah-LAY",      en:"to go",           ex:"Je vais au marché.",   exEn:"I go to the market." },
        { fr:"faire", ph:"FAIR",        en:"to do / to make", ex:"Je fais la cuisine.",  exEn:"I cook." },
      ]
    },
    {
      title: "être — all forms",
      words: [
        { fr:"je suis",    ph:"zhuh SWEE",   en:"I am",                          ex:"Je suis content.",         exEn:"I am happy." },
        { fr:"tu es",      ph:"tew EH",      en:"you are (friend)",               ex:"Tu es gentil.",            exEn:"You are kind." },
        { fr:"il est",     ph:"eel EH",      en:"he is",                         ex:"Il est médecin.",          exEn:"He is a doctor." },
        { fr:"elle est",   ph:"EL EH",       en:"she is",                        ex:"Elle est professeure.",    exEn:"She is a teacher." },
        { fr:"nous sommes",ph:"noo SUM",     en:"we are",                        ex:"Nous sommes canadiens.",   exEn:"We are Canadian." },
        { fr:"vous êtes",  ph:"voo ZET",     en:"you are (formal or group)",     ex:"Vous êtes aimable.",       exEn:"You are kind." },
        { fr:"ils sont",   ph:"eel SON",     en:"they are (group with males)",   ex:"Ils sont à l'école.",     exEn:"They are at school." },
        { fr:"elles sont", ph:"EL SON",      en:"they are (all female)",         ex:"Elles sont amies.",        exEn:"They are friends." },
      ]
    },
    {
      title: "avoir — all forms",
      words: [
        { fr:"j'ai",       ph:"ZHAY",        en:"I have",                        ex:"J'ai faim.",               exEn:"I am hungry." },
        { fr:"tu as",      ph:"tew AH",      en:"you have (friend)",             ex:"Tu as raison.",            exEn:"You are right." },
        { fr:"il a",       ph:"eel AH",      en:"he has",                        ex:"Il a une voiture.",        exEn:"He has a car." },
        { fr:"elle a",     ph:"EL AH",       en:"she has",                       ex:"Elle a un chat.",          exEn:"She has a cat." },
        { fr:"nous avons", ph:"noo ZAH-VON", en:"we have",                       ex:"Nous avons deux enfants.", exEn:"We have two children." },
        { fr:"vous avez",  ph:"voo ZAH-VAY", en:"you have (formal or group)",    ex:"Vous avez de la chance.",  exEn:"You are lucky." },
        { fr:"ils ont",    ph:"eel ZON",     en:"they have",                     ex:"Ils ont un appartement.",  exEn:"They have an apartment." },
        { fr:"elles ont",  ph:"EL ZON",      en:"they have (all female)",        ex:"Elles ont un chat.",       exEn:"They have a cat." },
      ]
    },
    {
      title: "aller — all forms",
      words: [
        { fr:"je vais",    ph:"zhuh VAY",    en:"I go / I am going",             ex:"Je vais au bureau.",       exEn:"I go to the office." },
        { fr:"tu vas",     ph:"tew VAH",     en:"you go (friend)",               ex:"Tu vas bien ?",            exEn:"Are you doing well?" },
        { fr:"il va",      ph:"eel VAH",     en:"he goes",                       ex:"Il va à la bibliothèque.", exEn:"He goes to the library." },
        { fr:"elle va",    ph:"EL VAH",      en:"she goes",                      ex:"Elle va au marché.",       exEn:"She goes to the market." },
        { fr:"nous allons",ph:"noo ZAH-LON", en:"we go",                         ex:"Nous allons au cinéma.",   exEn:"We go to the cinema." },
        { fr:"vous allez", ph:"voo ZAH-LAY", en:"you go (formal or group)",      ex:"Vous allez où ?",          exEn:"Where are you going?" },
        { fr:"ils vont",   ph:"eel VON",     en:"they go",                       ex:"Ils vont au parc.",        exEn:"They go to the park." },
        { fr:"elles vont", ph:"EL VON",      en:"they go (all female)",          ex:"Elles vont à l'école.",   exEn:"They go to school." },
      ]
    },
    {
      title: "faire — all forms",
      words: [
        { fr:"je fais",    ph:"zhuh FAY",    en:"I do / I make",                 ex:"Je fais du sport.",        exEn:"I exercise." },
        { fr:"tu fais",    ph:"tew FAY",     en:"you do / you make (friend)",    ex:"Tu fais quoi ce soir ?",   exEn:"What are you doing tonight?" },
        { fr:"il fait",    ph:"eel FAY",     en:"he does / he makes",            ex:"Il fait ses devoirs.",     exEn:"He does his homework." },
        { fr:"elle fait",  ph:"EL FAY",      en:"she does / she makes",          ex:"Elle fait la cuisine.",    exEn:"She cooks." },
        { fr:"nous faisons",ph:"noo fuh-ZON",en:"we do / we make",               ex:"Nous faisons une promenade.", exEn:"We go for a walk." },
        { fr:"vous faites",ph:"voo FET",     en:"you do / you make (formal/group)", ex:"Vous faites du bon travail.", exEn:"You do good work." },
        { fr:"ils font",   ph:"eel FON",     en:"they do / they make",           ex:"Ils font la fête.",        exEn:"They are having a party." },
        { fr:"elles font", ph:"EL FON",      en:"they do / they make (all female)", ex:"Elles font les courses.", exEn:"They do the grocery shopping." },
      ]
    },
    {
      title: "avoir expressions — where French says 'have', English says 'be'",
      words: [
        { fr:"avoir faim",   ph:"ah-VWAHR FAN",     en:"to be hungry (lit: to have hunger)",  ex:"J'ai faim après le sport.",    exEn:"I am hungry after sports." },
        { fr:"avoir soif",   ph:"ah-VWAHR SWAHF",   en:"to be thirsty (lit: to have thirst)", ex:"Tu as soif ?",                 exEn:"Are you thirsty?" },
        { fr:"avoir raison", ph:"ah-VWAHR ray-ZON", en:"to be right (lit: to have reason)",   ex:"Elle a toujours raison.",      exEn:"She is always right." },
        { fr:"avoir tort",   ph:"ah-VWAHR TOR",     en:"to be wrong (lit: to have fault)",    ex:"Il a tort cette fois.",        exEn:"He is wrong this time." },
        { fr:"avoir besoin", ph:"ah-VWAHR buh-ZWAN",en:"to need (lit: to have need of)",      ex:"J'ai besoin d'aide.",          exEn:"I need help." },
        { fr:"avoir faim",   ph:"ah-VWAHR FAN",     en:"to be hungry",                        ex:"Nous avons très faim ce soir.", exEn:"We are very hungry tonight." },
      ]
    },
    {
      title: "faire expressions — common activities",
      words: [
        { fr:"faire la cuisine",   ph:"FAIR lah kwee-ZEEN", en:"to cook",                   ex:"Il fait la cuisine le soir.",    exEn:"He cooks in the evening." },
        { fr:"faire les courses",  ph:"FAIR lay KOORS",     en:"to do the grocery shopping", ex:"Elle fait les courses.",         exEn:"She does the grocery shopping." },
        { fr:"faire du sport",     ph:"FAIR dew SPOR",      en:"to exercise / play sports",  ex:"Nous faisons du sport.",        exEn:"We exercise." },
        { fr:"faire une promenade",ph:"FAIR ewn prom-NAHD", en:"to go for a walk",           ex:"Ils font une promenade.",       exEn:"They go for a walk." },
      ]
    },
    {
      title: "aller + à — going to places",
      words: [
        { fr:"aller au marché",         ph:"ah-LAY oh mar-SHAY",      en:"to go to the market",        ex:"Je vais au marché.",           exEn:"I go to the market." },
        { fr:"aller à l'école",         ph:"ah-LAY ah lay-KUL",       en:"to go to school",            ex:"Ils vont à l'école.",          exEn:"They go to school." },
        { fr:"aller au cinéma",         ph:"ah-LAY oh see-nay-MAH",   en:"to go to the cinema",        ex:"Nous allons au cinéma.",       exEn:"We go to the cinema." },
        { fr:"aller au travail",        ph:"ah-LAY oh tra-VAY",       en:"to go to work",              ex:"Elle va au travail.",          exEn:"She goes to work." },
        { fr:"aller au bureau",         ph:"ah-LAY oh bew-ROH",       en:"to go to the office",        ex:"Je vais au bureau.",           exEn:"I go to the office." },
      ]
    },
    {
      title: "frequency adverbs — how often",
      words: [
        { fr:"toujours",      ph:"too-ZHOOR",  en:"always",    ex:"Il est toujours à l'heure.",   exEn:"He is always on time." },
        { fr:"souvent",       ph:"soo-VON",    en:"often",     ex:"Nous allons souvent au parc.", exEn:"We often go to the park." },
        { fr:"parfois",       ph:"par-FWAH",   en:"sometimes", ex:"Elle fait parfois des erreurs.", exEn:"She sometimes makes mistakes." },
        { fr:"jamais",        ph:"zhah-MAY",   en:"never",     ex:"Je ne fais jamais ça.",        exEn:"I never do that." },
        { fr:"tous les jours",ph:"too lay ZHOOR",en:"every day", ex:"Il fait du sport tous les jours.", exEn:"He exercises every day." },
      ]
    },
    {
      title: "time expressions — when",
      words: [
        { fr:"maintenant",  ph:"man-tuh-NON",  en:"now",              ex:"Je vais au marché maintenant.",  exEn:"I am going to the market now." },
        { fr:"le matin",    ph:"luh ma-TAN",   en:"in the morning",   ex:"Je fais du café le matin.",      exEn:"I make coffee in the morning." },
        { fr:"le soir",     ph:"luh SWAHR",    en:"in the evening",   ex:"Nous faisons du sport le soir.", exEn:"We exercise in the evening." },
        { fr:"ce soir",     ph:"suh SWAHR",    en:"tonight",          ex:"Ils vont au cinéma ce soir.",   exEn:"They go to the cinema tonight." },
        { fr:"aujourd'hui", ph:"oh-zhoor-DWEE",en:"today",            ex:"Elle est à la maison aujourd'hui.", exEn:"She is at home today." },
      ]
    },
    {
      title: "nouns — people and places used in this week's sentences",
      words: [
        { fr:"le marché",      ph:"luh mar-SHAY",    en:"the market",     ex:"Il va au marché.",             exEn:"He goes to the market." },
        { fr:"la maison",      ph:"lah may-ZON",     en:"the house / home", ex:"Nous sommes à la maison.",  exEn:"We are at home." },
        { fr:"le bureau",      ph:"luh bew-ROH",     en:"the office",     ex:"Elle va au bureau.",           exEn:"She goes to the office." },
        { fr:"l'école",        ph:"lay-KUL",         en:"the school",     ex:"Ils vont à l'école.",         exEn:"They go to school." },
        { fr:"le parc",        ph:"luh PARK",        en:"the park",       ex:"Je vais au parc.",             exEn:"I go to the park." },
        { fr:"le cinéma",      ph:"luh see-nay-MAH", en:"the cinema",     ex:"Tu vas au cinéma ?",           exEn:"Are you going to the cinema?" },
        { fr:"le travail",     ph:"luh tra-VAY",     en:"work / the job", ex:"Il fait son travail.",         exEn:"He does his work." },
        { fr:"le sport",       ph:"luh SPOR",        en:"sport / exercise", ex:"Nous faisons du sport.",   exEn:"We exercise." },
        { fr:"la cuisine",     ph:"lah kwee-ZEEN",   en:"cooking / kitchen", ex:"Elle fait la cuisine.",   exEn:"She cooks." },
        { fr:"les cours",      ph:"lay KOOR",        en:"the classes / lessons", ex:"Je vais aux cours.", exEn:"I go to class." },
        { fr:"les devoirs",    ph:"lay duh-VWAHR",   en:"the homework",   ex:"Il fait ses devoirs.",         exEn:"He does his homework." },
      ]
    },
    {
      title: "question words",
      words: [
        { fr:"comment", ph:"kuh-MON",  en:"how",   ex:"Comment tu vas ?",          exEn:"How are you?" },
        { fr:"pourquoi",ph:"poor-KWAH",en:"why",   ex:"Pourquoi tu vas là-bas ?",  exEn:"Why are you going there?" },
        { fr:"où",      ph:"OO",       en:"where", ex:"Où allez-vous ?",            exEn:"Where are you going?" },
        { fr:"quand",   ph:"KON",      en:"when",  ex:"Quand fais-tu du sport ?",  exEn:"When do you exercise?" },
      ]
    }
  ];

  /* ── All IDs for show all / hide all ── */
  const allEnIds = [];
  const allExEnIds = [];

  function showAllEnglish() {
    allEnIds.forEach(id   => { const el = document.getElementById(id);   if(el) el.classList.add('shown'); });
    allExEnIds.forEach(id => { const el = document.getElementById(id);   if(el) el.classList.add('shown'); });
    document.querySelectorAll('.reveal-btn').forEach(b     => b.textContent = '🙈 Hide English');
    document.querySelectorAll('.reveal-translation-btn').forEach(b => b.textContent = '🙈 Hide');
  }

  function hideAllEnglish() {
    allEnIds.forEach(id   => { const el = document.getElementById(id);   if(el) el.classList.remove('shown'); });
    allExEnIds.forEach(id => { const el = document.getElementById(id);   if(el) el.classList.remove('shown'); });
    document.querySelectorAll('.reveal-btn').forEach(b     => b.textContent = '👁 Show English');
    document.querySelectorAll('.reveal-translation-btn').forEach(b => b.textContent = '👁 Show Translation');
  }

  /* ── Build cards ── */
  const container = document.getElementById('vocab-container');
  let idx = 0;

  sections.forEach(section => {
    // Section title
    const secTitle = document.createElement('div');
    secTitle.className = 'vocab-section-title';
    secTitle.textContent = section.title;
    container.appendChild(secTitle);

    section.words.forEach(word => {
      const i = idx++;
      const wordAudioId = `wa-${i}`;
      const exAudioId   = `ea-${i}`;
      const enId        = `en-${i}`;
      const exEnId      = `exen-${i}`;
      const enBtnId     = `enb-${i}`;
      const exEnBtnId   = `exenb-${i}`;

      allEnIds.push(enId);
      allExEnIds.push(exEnId);

      const card = document.createElement('div');
      card.className = 'vocab-card';
      card.innerHTML = `
        <div class="vocab-french">${word.fr}</div>
        <div class="vocab-phonetic">🔊 ${word.ph}</div>

        <div class="word-player-wrap" id="${wordAudioId}"></div>

        <div class="reveal-wrap">
          <button class="reveal-btn" id="${enBtnId}">👁 Show English</button>
          <div class="vocab-english" id="${enId}">${word.en}</div>
        </div>

        <hr class="vocab-divider" />

        <div class="example-label">Example</div>
        <div class="example-fr">${word.ex}</div>
        <div class="example-player-wrap" id="${exAudioId}"></div>
        <button class="reveal-translation-btn" id="${exEnBtnId}">👁 Show Translation</button>
        <div class="example-en" id="${exEnId}">${word.exEn}</div>
      `;

      container.appendChild(card);

      requestAnimationFrame(() => {
        buildPlayer(word.fr.replace(/<[^>]+>/g,''), wordAudioId);
        buildPlayer(word.ex.replace(/<[^>]+>/g,''), exAudioId);
        setupReveal(enBtnId,   enId,   '👁 Show English',      '🙈 Hide English');
        setupReveal(exEnBtnId, exEnId, '👁 Show Translation',  '🙈 Hide');
      });
    });
  });
  </script>
</body>
</html>
